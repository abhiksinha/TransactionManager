name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true

      - name: Download deps
        run: go mod download

      - name: Unit tests (internal only)
        run: go test ./internal/...

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true

      - name: Download deps
        run: go mod download

      - name: Build
        run: go build ./cmd/api

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true

      - name: Download deps
        run: go mod download

      - name: gofmt
        run: |
          fmt_out=$(gofmt -l .)
          if [ -n "$fmt_out" ]; then
            echo "gofmt check failed:"
            echo "$fmt_out"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true

      - name: Download deps
        run: go mod download

      - name: Ensure scripts are executable
        run: chmod +x ./run ./stop

      - name: Start stack
        run: ./run

      - name: E2E tests
        run: go test ./e2e

      - name: Stop stack
        if: always()
        run: ./stop
