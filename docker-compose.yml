services:
  postgres:
    image: postgres:15-alpine
    container_name: transaction-manager-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-transaction_manager}
    ports:
      - "5432:5432"
    volumes:
      - transaction-manager-db-data:/var/lib/postgresql/data
    restart: always

volumes:
  transaction-manager-db-data:
    driver: local
